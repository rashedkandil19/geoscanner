<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- Title -->
    <title>GeoScanner | Discover Places Around You</title>

    <!-- SEO -->
    <meta
      name="description"
      content="GeoScanner helps you discover nearby places, businesses, hospitals, restaurants, malls, police stations, and more with fast location-based search."
    />
    <meta
      name="keywords"
      content="GeoScanner, maps, nearby places, location finder, hospitals, restaurants, malls"
    />
    <meta name="author" content="GeoScanner" />
    <meta name="robots" content="index, follow" />

    <!-- Theme -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="color-scheme" content="dark light" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="GeoScanner" />
    <meta
      property="og:description"
      content="Find nearby places instantly with GeoScanner."
    />
    <meta property="og:image" content="/preview.png" />
    <meta property="og:url" content="https://yourdomain.com" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GeoScanner" />
    <meta
      name="twitter:description"
      content="Find nearby places instantly with GeoScanner."
    />
    <meta name="twitter:image" content="/preview.png" />

    <!-- Mobile -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Canonical -->
    <link rel="canonical" href="https://yourdomain.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
