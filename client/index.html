<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/spotlylogo1.png" />

    <title>Spotly | Discover Places Around You</title>

    <meta
      name="description"
      content="Spotly helps you discover nearby places, businesses, restaurants, hospitals, malls, and more using fast location-based search."
    />
    <meta
      name="keywords"
      content="Spotly, nearby places, maps, location finder, restaurants, hospitals, businesses"
    />
    <meta name="author" content="Spotly" />
    <meta name="robots" content="index, follow" />

    <!-- Theme -->
    <meta name="theme-color" content="#0f172a" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Spotly" />
    <meta
      property="og:description"
      content="Find nearby places instantly with Spotly."
    />
    <meta property="og:image" content="/preview.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Spotly" />
    <meta
      name="twitter:description"
      content="Find nearby places instantly with Spotly."
    />
    <meta name="twitter:image" content="/preview.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
